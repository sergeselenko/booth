<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Ordering</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#0a1628}
.c{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d1b2a 0%,#0a1628 50%,#060f1d 100%)}
.m{text-align:center;text-transform:uppercase;font-family:'Bebas Neue',sans-serif;line-height:.82;width:100%}
.a{font-size:46vw;color:#fff;display:block;letter-spacing:-.02em}
.v{font-size:34vw;color:rgba(255,255,255,.85);display:block;letter-spacing:.02em}
.o{font-size:22vw;color:#0a1628;display:block;letter-spacing:.08em;background:#00e5ff;padding:2.5vh 0;width:100%;margin-top:1vh}
</style>
</head>
<body>
<div class="c">
<div class="m">
<span class="a">AI</span>
<span class="v">VOICE</span>
<span class="o">ORDERING</span>
</div>
</div>
</body>
</html>
