<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Ordering</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000}
.c{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000}
.m{text-align:center;text-transform:uppercase;font-family:'Bebas Neue',sans-serif;line-height:.85;width:100%}
.a{font-size:42vw;color:#00e5ff;display:block;letter-spacing:-.02em;text-shadow:0 0 60px rgba(0,229,255,.3)}
.v{font-size:32vw;color:#fff;display:block;letter-spacing:.02em}
.o{font-size:21vw;color:#000;display:block;letter-spacing:.06em;background:#00e5ff;padding:2vh 0;margin:1vh 0 0 0;width:100%;box-shadow:0 0 60px rgba(0,229,255,.4)}
.tag{font-family:'Bebas Neue',sans-serif;font-size:5vh;color:rgba(255,255,255,.7);letter-spacing:.3em;text-transform:uppercase;margin-top:4vh}
</style>
</head>
<body>
<div class="c">
<div class="m">
<span class="a">AI</span>
<span class="v">VOICE</span>
<span class="o">ORDERING</span>
</div>
<div class="tag">NEVER MISS AN ORDER</div>
</div>
</body>
</html>
